name: habit_flow
description: A new Flutter project for habit and fitness tracking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  
  # Navigation
  go_router: ^13.1.0

  # Local Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2

  # UI and Utilities
  flutter_local_notifications: ^17.1.2
  fl_chart: ^0.65.0
  intl: ^0.20.2
  uuid: ^4.3.3
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.8
  isar_generator: ^3.1.0+1
  mocktail: ^1.0.2
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
